# Workspace root — not a package itself.
# Enables `uv sync` / `uv run` from the repo root for CI.

[tool.uv.workspace]
members = ["packages/*"]

# Pin minimum versions of transitive deps that have advisories. These come
# in via claude-agent-sdk → mcp / pydantic-settings — we don't depend on
# them directly, but pip-audit flags them and we want the lockfile to
# resolve to patched releases.
[tool.uv]
constraint-dependencies = [
    "cryptography>=46.0.7",   # CVE-2026-34073, CVE-2026-39892
    "pyjwt>=2.12.0",          # CVE-2026-32597
    "python-dotenv>=1.2.2",   # CVE-2026-28684
    "python-multipart>=0.0.26", # CVE-2026-40347
]

[tool.pytest.ini_options]
testpaths = ["packages/agent-worker/tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
