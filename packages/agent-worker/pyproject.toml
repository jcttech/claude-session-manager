[build-system]
requires = ["hatchling", "hatch-vcs", "grpcio-tools>=1.80.0"]
build-backend = "hatchling.build"

[project]
name = "agent-worker"
dynamic = ["version"]
description = "gRPC Agent SDK worker for claude-session-manager"
requires-python = ">=3.13"
dependencies = [
    "claude-agent-sdk>=0.1.71",
    "grpcio>=1.80.0",
    "protobuf>=6.33.6,<7.0.0",
]

[project.scripts]
team = "agent_worker.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "grpcio-tools>=1.80.0",
    "ruff>=0.15.12",
]

[tool.hatch.version]
source = "vcs"
tag-pattern = "agent-worker/v(?P<version>.*)"
root = "../.."
fallback-version = "0.0.0+dev"

[tool.hatch.build.hooks.custom]
path = "build_hook.py"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_worker"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py313"
exclude = [
    "src/agent_worker/agent_pb2.py",
    "src/agent_worker/agent_pb2_grpc.py",
]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
