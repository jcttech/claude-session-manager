syntax = "proto3";
package claude_agent;

service AgentWorker {
  // One bidirectional stream per session — replaces Execute + SendMessage
  rpc Session (stream SessionInput) returns (stream AgentEvent);
  rpc Interrupt (InterruptRequest) returns (InterruptResponse);
  rpc ClearSession (ClearRequest) returns (ClearResponse);
  rpc Health (HealthRequest) returns (HealthResponse);
}

message SessionInput {
  oneof input {
    CreateSession create = 1;
    FollowUp follow_up = 2;
    // Reply to a previously-emitted CliCommand. session-manager sends this
    // after handling the command so the in-container CLI binary can print
    // and exit.
    CliResponse cli_response = 3;
  }
}

message CreateSession {
  string prompt = 1;
  string permission_mode = 2;
  map<string, string> env = 3;
  string system_prompt_append = 4;
  int32 max_turns = 5;
  int32 max_thinking_tokens = 6;
  string resume_session_id = 7;
}

message FollowUp {
  string prompt = 1;
}

message InterruptRequest {
  string session_id = 1;
}

message InterruptResponse {
  bool success = 1;
}

message ClearRequest {
  string session_id = 1;
}

message ClearResponse {
  bool success = 1;
}

message HealthRequest {}
message HealthResponse {
  bool ready = 1;
  string worker_version = 2;
}

message AgentEvent {
  oneof event {
    SessionInit session_init = 1;
    TextContent text = 2;
    ToolUse tool_use = 3;
    ToolResult tool_result = 4;
    SubagentEvent subagent = 5;
    SessionResult result = 6;
    AgentError error = 7;
    RateLimit rate_limit = 8;
    // CLI command emitted by the in-container `team` binary, forwarded
    // upstream via the existing bidi Session stream so the container
    // doesn't need its own outbound network path. session-manager
    // dispatches and replies via SessionInput.cli_response.
    CliCommand cli_command = 9;
  }
}

message SessionInit { string session_id = 1; }

message TextContent {
  string text = 1;
  bool is_partial = 2;
}

message ToolUse {
  string tool_name = 1;
  string tool_use_id = 2;
  string input_json = 3;
}

message ToolResult {
  string tool_use_id = 1;
  bool is_error = 2;
}

message SubagentEvent {
  string agent_name = 1;
  string parent_tool_use_id = 2;
  bool is_start = 3;
}

message SessionResult {
  string session_id = 1;
  uint64 input_tokens = 2;       // cumulative across all API calls (for billing display)
  uint64 output_tokens = 3;      // cumulative across all API calls
  double cost_usd = 4;
  int32 num_turns = 5;
  int64 duration_ms = 6;
  bool is_error = 7;
  string result_text = 8;
  uint64 context_tokens = 9;     // last API call's input tokens (actual context window usage)
}

message AgentError {
  string message = 1;
  string error_type = 2;
  // Full raw JSON payload when the SDK message couldn't be parsed cleanly.
  // Lets session-manager surface "we don't understand this yet, here's the
  // raw bytes" instead of silently dropping unknown signals.
  string raw_json = 3;
}

// CliCommand: a request from the in-container `team` CLI binary, forwarded
// upstream by agent-worker via the bidi Session stream. session-manager
// replies via SessionInput.cli_response with matching cli_id.
message CliCommand {
  // Correlation id (UUID) used to match request ↔ response across the bidi
  // stream. Generated by agent-worker when the CLI connects to its
  // Unix-socket server.
  string cli_id = 1;
  // The CLI verb: "status" | "to" | "spawn" | "interrupt" | "cancel" | "clear".
  // Validated session-manager-side; unknown verbs return a non-zero exit.
  string verb = 2;
  // Positional arguments after the verb, in order.
  repeated string args = 3;
  // Long-form flags (--json, --queue-id=N, etc.). Empty when not used.
  map<string, string> flags = 4;
}

// CliResponse: session-manager's reply for a given cli_id. The CLI binary
// prints stdout/stderr on the corresponding stream and exits with exit_code.
message CliResponse {
  string cli_id = 1;
  int32 exit_code = 2;
  string stdout = 3;
  string stderr = 4;
}

// Mirrors claude_agent_sdk.RateLimitInfo. Emitted whenever the CLI signals a
// rate-limit transition (allowed → allowed_warning → rejected, or back).
// session-manager pauses the team task queue while status == "rejected".
message RateLimit {
  // "allowed" | "allowed_warning" | "rejected"
  string status = 1;
  // Unix timestamp (seconds). 0 if unknown.
  int64 resets_at = 2;
  // "five_hour" | "seven_day" | "seven_day_opus" | "seven_day_sonnet" | "overage"
  string limit_type = 3;
  // 0.0 - 1.0. -1.0 if unknown.
  double utilization = 4;
  // Full raw payload from the SDK for debugging / unmodeled fields.
  string raw_json = 5;
}
